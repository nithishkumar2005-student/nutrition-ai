<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Hill Calories AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:linear-gradient(180deg,#071a16,#02110e);
font-family:Inter,sans-serif;
}

.glass{
background:rgba(255,255,255,.03);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.08);
}

.glow:hover{
box-shadow:0 0 20px rgba(13,242,166,.5);
}

</style>

</head>

<body class="text-white">

<!-- NAVBAR -->

<nav class="flex justify-between items-center px-10 py-6">

<h1 class="font-bold text-lg">Hill Calories AI</h1>

<div class="flex gap-6 items-center text-sm text-gray-300">
<a href="https://www.linkedin.com/in/pnithishkumar2005/">LinkedIn</a>
<a href="mailto:nitishkumar83411@gmail.com">Gmail</a>
<button id="uploadBtn" class="bg-[#0df2a6] text-black px-4 py-2 rounded-lg glow">Analyze Meal</button>
</div>

</nav>


<!-- HERO -->

<section class="max-w-7xl mx-auto grid lg:grid-cols-2 gap-16 px-10 py-20">

<div>

<h1 class="text-6xl font-black leading-tight mb-6">
Know Your <span class="text-[#0df2a6]">Nutrients</span> Instantly
</h1>

<p class="text-gray-400 mb-8">
Upload food image and get calories + macros instantly using AI.
</p>

<button onclick="uploadBtn.click()" class="bg-[#0df2a6] text-black px-7 py-4 rounded-xl font-bold glow">
Start Analyzing →
</button>

<input type="file" id="fileInput" hidden>

</div>

<div class="glass rounded-2xl p-4">

<img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c"
class="rounded-xl"/>

</div>

</section>


<!-- RESULT SECTION -->

<section class="max-w-4xl mx-auto px-10 pb-20">

<div class="glass rounded-xl p-8">

<h2 class="text-2xl font-bold mb-6">Meal Analysis</h2>

<div class="grid grid-cols-2 gap-4 mb-6">

<div>Total Calories: <b id="calories">0</b></div>
<div>Health Score: <b id="score">0</b></div>
<div>Protein: <b id="protein">0</b></div>
<div>Carbs: <b id="carbs">0</b></div>
<div>Fat: <b id="fat">0</b></div>

</div>

<canvas id="chart"></canvas>

<ul id="items" class="mt-6 list-disc pl-6"></ul>

<p id="insight" class="mt-4 text-green-300"></p>

</div>

</section>


<script src="script.js"></script>

</body>
</html>
